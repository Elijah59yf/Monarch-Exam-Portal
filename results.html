<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results · Monarch Exam Portal</title>
  <meta name="description" content="Enter your Result PIN to check your Monarch exam results." />
  <link rel="stylesheet" href="css/portal.css" />
  <link rel="icon" type="image/png" href="favicon/android-chrome-512x512-removebg-preview.png" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-crest"><img src="favicon/android-chrome-512x512-removebg-preview.png" alt="" /></span>
        Monarch <span class="logo-light">Exam Portal</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Register</a>
        <a href="password.html" class="nav-link">Get Password</a>
        <a href="results.html" class="nav-link active">Results</a>
      </nav>
    </div>
  </header>

  <main class="page">

    <!-- Main Content -->
    <div id="form-content">

      <div class="doc-head">
        <span class="stamp">Result<small>Statement</small></span>
        <h1>Check Your Results</h1>
        <hr class="rule" />
      </div>

      <form id="result-form" autocomplete="off" novalidate>

        <div class="field" id="pin-group">
          <label for="pin">Result PIN</label>
          <input type="text" id="pin" class="input mono" placeholder="A1B2C3D4E5" required />
          <p class="err-msg"></p>
        </div>

        <div class="field" style="margin-top:22px">
          <button type="submit" class="btn" id="submit-btn">
            <span class="btn-txt"><i data-lucide="file-check" class="btn-ico"></i> Check result</span>
            <span class="spin"></span>
          </button>
        </div>

      </form>
    </div>

    <!-- Result -->
    <div id="result" class="result"></div>

  </main>

  <footer class="site-footer">
    <p class="term display-academic-term"></p>
    <p>&copy; 2026 Monarch Exam Portal. All rights reserved.</p>
  </footer>

  <script src="js/global.js"></script>
  <script src="js/api.js"></script>
  <script src="js/results.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
